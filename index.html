<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小渝｜身心覺察 · 免費電子書領取</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FAF8F4;
    --warm: #F2EDE4;
    --stone: #C8BFB0;
    --muted: #8C8279;
    --dark: #2C2520;
    --accent: #9B7FA6;
    --accent-light: #E8DFF0;
    --gold: #B89B6E;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(155,127,166,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(184,155,110,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* Header */
  .brand {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.6s ease both;
  }

  .brand-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .brand-name::before,
  .brand-name::after {
    content: '';
    flex: 1;
    max-width: 60px;
    height: 0.5px;
    background: var(--stone);
  }

  .hero {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.7s 0.1s ease both;
  }

  .free-badge {
    display: inline-block;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0.12em;
    padding: 4px 16px;
    border-radius: 99px;
    margin-bottom: 1.2rem;
    font-weight: 400;
  }

  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: 26px;
    font-weight: 400;
    line-height: 1.55;
    color: var(--dark);
    margin-bottom: 0.9rem;
  }

  .hero p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.8;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 2rem 0;
    opacity: 0.5;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 0.5px;
    background: var(--stone);
  }
  .divider span {
    font-size: 14px;
    color: var(--stone);
  }

  /* Card */
  .card {
    background: #fff;
    border: 0.5px solid rgba(200,191,176,0.6);
    border-radius: var(--radius);
    padding: 2rem;
    box-shadow: 0 2px 24px rgba(44,37,32,0.05);
    animation: fadeUp 0.7s 0.2s ease both;
  }

  .section-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .field { margin-bottom: 1.1rem; }

  .field input {
    width: 100%;
    height: 46px;
    padding: 0 14px;
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    border: 0.5px solid var(--stone);
    border-radius: var(--radius-sm);
    background: var(--cream);
    color: var(--dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--stone); }

  /* Book picker */
  .pick-label {
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin: 1.4rem 0 0.7rem;
    display: block;
  }

  .books { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.4rem; }

  .book {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 15px;
    border: 0.5px solid rgba(200,191,176,0.5);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.18s;
    background: var(--cream);
    position: relative;
  }

  .book:hover {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .book.selected {
    border-color: var(--accent);
    background: var(--accent-light);
  }

  .book input[type="radio"] {
    margin-top: 3px;
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  .book-text { flex: 1; }

  .book-title {
    font-size: 13px;
    font-weight: 400;
    color: var(--dark);
    line-height: 1.4;
    font-family: 'Noto Serif TC', serif;
  }

  .book-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.5;
  }

  /* Consent */
  .consent {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 1.4rem;
    padding: 12px 14px;
    background: var(--warm);
    border-radius: var(--radius-sm);
  }

  .consent input[type="checkbox"] {
    margin-top: 2px;
    accent-color: var(--accent);
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }

  .consent span {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
  }

  /* Submit button */
  .btn {
    width: 100%;
    height: 50px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--dark);
    color: var(--cream);
    font-family: 'Noto Serif TC', serif;
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn:hover::after { opacity: 0.12; }
  .btn:active { transform: scale(0.99); }

  .note {
    text-align: center;
    font-size: 11px;
    color: var(--stone);
    margin-top: 1rem;
    letter-spacing: 0.04em;
    line-height: 1.7;
  }

  /* Success */
  .success-wrap {
    display: none;
    text-align: center;
    padding: 3rem 1rem;
    animation: fadeUp 0.5s ease both;
  }

  .success-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 0.5px solid var(--stone);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    background: var(--warm);
  }

  .success-wrap h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 400;
    margin-bottom: 0.8rem;
    color: var(--dark);
  }

  .success-wrap p {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.9;
  }

  .success-book {
    display: inline-block;
    margin: 1rem 0;
    padding: 6px 18px;
    background: var(--accent-light);
    color: var(--accent);
    border-radius: 99px;
    font-size: 13px;
    font-family: 'Noto Serif TC', serif;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 2.5rem;
    font-size: 12px;
    color: var(--stone);
    letter-spacing: 0.08em;
    animation: fadeUp 0.7s 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .container { padding: 2rem 1rem 3rem; }
    .card { padding: 1.5rem; }
    .hero h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="brand">
    <div class="brand-name">小渝｜身心覺察</div>
  </div>

  <div class="hero">
    <div class="free-badge">免費領取 · 限時開放</div>
    <h1>選一本最需要的電子書<br>幾分鐘內寄達你的信箱</h1>
    <p>六本身心靈成長手冊，每一本都是陪伴你<br>向內探索、回到自己的起點。</p>
  </div>

  <div class="card" id="formCard">
    <span class="section-label">YOUR NAME · 你的名字</span>
    <div class="field">
      <input type="text" id="uname" placeholder="請輸入你的名字">
    </div>

    <span class="section-label">EMAIL · 信箱</span>
    <div class="field">
      <input type="email" id="uemail" placeholder="your@email.com">
    </div>

    <span class="pick-label">CHOOSE · 選擇你想要的電子書（六選一）</span>
    <div class="books" id="bookList">

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="幸運頻率對齊指南">
        <div class="book-text">
          <div class="book-title">幸運頻率對齊指南</div>
          <div class="book-sub">清理匱乏雜訊，重新對齊你的豐盛通道</div>
        </div>
      </label>

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="身體語言判讀練習手冊">
        <div class="book-text">
          <div class="book-title">身體語言判讀練習手冊</div>
          <div class="book-sub">從肩頸、下顎到胸腔，聽懂身體一直想說的話</div>
        </div>
      </label>

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="溫柔的自我對話練習指南">
        <div class="book-text">
          <div class="book-title">溫柔的自我對話練習指南</div>
          <div class="book-sub">從用力抓取，轉向輕盈對齊的三個深層練習</div>
        </div>
      </label>

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="睡前能量淨化練習">
        <div class="book-text">
          <div class="book-title">睡前能量淨化練習</div>
          <div class="book-sub">放下白天的盔甲，讓內在小孩安穩入眠</div>
        </div>
      </label>

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="內在小孩覺察手冊">
        <div class="book-text">
          <div class="book-title">內在小孩覺察手冊</div>
          <div class="book-sub">辨識八種內在小孩原型，找到情緒根源與療癒關鍵</div>
        </div>
      </label>

      <label class="book" onclick="pick(this)">
        <input type="radio" name="book" value="靈魂對齊手冊">
        <div class="book-text">
          <div class="book-title">靈魂對齊手冊</div>
          <div class="book-sub">收回散落的能量，重新排列你的生命優先順序</div>
        </div>
      </label>

    </div>

    <div class="consent">
      <input type="checkbox" id="agree">
      <span>我同意接收後續相關資訊與內容分享。你的資料僅用於寄送電子書，不會提供給第三方。</span>
    </div>

    <button class="btn" onclick="doSubmit()">立即免費領取</button>
    <p class="note">填寫完成後，電子書將在幾分鐘內寄至你的信箱<br>記得也查看垃圾郵件資料夾</p>
  </div>

  <div class="success-wrap" id="successWrap">
    <div class="success-icon">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <path d="M5 12l5 5 9-9" stroke="#9B7FA6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>已成功送出</h2>
    <div class="success-book" id="successBook"></div>
    <p id="successMsg"></p>
  </div>

  <div class="footer">
    © 小渝｜身心覺察 · 帶著滿滿的愛與你同行
  </div>

</div>

<script>
  // ──────────────────────────────────────────────
  // ★ 請將以下連結替換成你的 Google Drive 分享連結
  // ──────────────────────────────────────────────
  const LINKS = {
    "幸運頻率對齊指南":       "https://drive.google.com/file/d/1lu2Fzg8_Pf4_pQ-7voLXj-dSe6mbvSRZ/view?usp=share_link",
    "身體語言判讀練習手冊":   "https://drive.google.com/file/d/1Tl-iSbM9VkLosfAQQ4TvflTwWrcHmt_F/view?usp=share_link",
    "溫柔的自我對話練習指南": "https://drive.google.com/file/d/1Kol4PKqchIIwRD_j1MRQZDJ4sRVwV-vz/view?usp=share_link",
    "睡前能量淨化練習":       "https://drive.google.com/file/d/1PUGfBa-cvZ-efmvexNj2HS_mOeMV1O2N/view?usp=share_link",
    "內在小孩覺察手冊":       "https://drive.google.com/file/d/1W_UEwLExskfzGpQ-zUXHsoEUKOKW6Mmq/view?usp=share_link",
    "靈魂對齊手冊":           "https://drive.google.com/file/d/1SAbGov9GGXi7a93bdJCg3uyvTawlywxZ/view?usp=share_link"
  };

  // ──────────────────────────────────────────────
  // ★ 請替換成你的 Google Apps Script 部署網址
  //   （下方 Apps Script 程式碼部署後會得到此網址）
  // ──────────────────────────────────────────────
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbywYIHRnDgxKkIMNeLke5HNAjcaTiY9DPYQAqfQL5rpUiiLKggBYrhPYJX-C__OkeJQ/exec";

  function pick(el) {
    document.querySelectorAll('.book').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
  }

  async function doSubmit() {
    const name   = document.getElementById('uname').value.trim();
    const email  = document.getElementById('uemail').value.trim();
    const book   = document.querySelector('input[name="book"]:checked');
    const agreed = document.getElementById('agree').checked;

    if (!name)   { alert('請填寫你的名字'); return; }
    if (!email || !email.includes('@')) { alert('請填寫正確的 Email'); return; }
    if (!book)   { alert('請選擇一本電子書'); return; }
    if (!agreed) { alert('請勾選同意後再送出'); return; }

    const btn = document.querySelector('.btn');
    btn.textContent = '送出中…';
    btn.disabled = true;

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, book: book.value, ts: new Date().toISOString() })
      });
    } catch(e) { /* no-cors 模式下忽略錯誤 */ }

    // 顯示成功畫面
    document.getElementById('formCard').style.display = 'none';
    const sw = document.getElementById('successWrap');
    sw.style.display = 'block';
    document.getElementById('successBook').textContent = '《' + book.value + '》';
    document.getElementById('successMsg').innerHTML =
      '電子書正在寄送中，<br>請稍候幾分鐘查看 <strong>' + email + '</strong> 信箱。<br><br>感謝你願意為自己停下來 ✨';
  }
</script>
</body>
</html>
